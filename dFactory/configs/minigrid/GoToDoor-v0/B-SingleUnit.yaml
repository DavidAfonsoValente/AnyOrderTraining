# Config for Phase 2: MiniGrid Ablation
# Environment: GoToDoor-v0
# Condition: B-SingleUnit (Baseline, masked-DLM analog of IL)

model:
  # Path to the pre-trained LLaDA model converted with moe_convertor.py
  model_path: /home/davidvalente/AnyOrderTraining/models/LLaDA2.0-mini-preview_merged
  tokenizer_path: /home/davidvalente/AnyOrderTraining/models/LLaDA2.0-mini-preview_merged
  # Attention implementation can be 'sdpa' for efficiency
  attn_implementation: "sdpa"

data:
  # Path to the generated training data for this environment
  train_path: /home/davidvalente/AnyOrderTraining/data/minigrid/GoToDoor-v0_train.jsonl
  # Data type must be specified for the new transform logic
  data_type: "conversation" # This tells the script to look for the sampler
  datasets_type: "local" # Use the local dataset loader
  # Max sequence length for MiniGrid trajectories
  max_seq_len: 256
  # Configuration for the AnyOrderSampler, injected into the training script
  sampler:
    # mode corresponds to the B-SingleUnit condition
    mode: 'b_singleunit'
    # The spec for B-SingleUnit says to mask one ACTION unit
    mask_strategy: 'actions_only'
    # mask_prob is not used in this mode, but good to have for completeness
    mask_prob: 0.0

train:
  # The output directory is overridden by the SLURM script, but a placeholder is useful
  output_dir: /home/davidvalente/AnyOrderTraining/results/phase2/GoToDoor-v0/B-SingleUnit
  # The seed is also overridden by the SLURM script
  seed: 42

  # Training hyperparameters
  num_train_epochs: 10
  micro_batch_size: 4
  global_batch_size: 32
  lr: 5.0e-5
  lr_warmup_ratio: 0.01
  lr_decay_style: "cosine"
  weight_decay: 0.1
  
  # Logging and saving
  use_wandb: false # Can be enabled if desired
  save_steps: 1000 # Save checkpoints periodically
  
  # Using BF16 for training efficiency
  enable_mixed_precision: true
