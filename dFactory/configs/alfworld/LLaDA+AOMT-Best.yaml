# Config for Phase 3: ALFWorld Primary Evaluation
# Condition: LLaDA+AOMT-Best (Proposed Method)

model:
  model_path: /home/davidvalente/AnyOrderTraining/models/LLaDA2.0-mini-preview_merged
  tokenizer_path: /home/davidvalente/AnyOrderTraining/models/LLaDA2.0-mini-preview_merged
  attn_implementation: "sdpa"

data:
  train_path: /home/davidvalente/AnyOrderTraining/data/alfworld/train.jsonl
  data_type: "conversation"
  datasets_type: "local"
  max_seq_len: 1024
  sampler:
    # AOMT-Best is selected from Phase 2. We'll use AO-p50 as a strong default.
    # The spec notes a contingency plan if this doesn't perform well.
    mode: 'any_order'
    mask_strategy: 'mixed'
    mask_prob: 0.50

train:
  output_dir: /home/davidvalente/AnyOrderTraining/results/phase3/LLaDA+AOMT-Best
  seed: 42
  num_train_epochs: 5
  micro_batch_size: 1
  global_batch_size: 16
  lr: 2.0e-5
  lr_warmup_ratio: 0.01
  lr_decay_style: "cosine"
  weight_decay: 0.1
  use_wandb: false
  save_steps: 1000
  enable_mixed_precision: true
