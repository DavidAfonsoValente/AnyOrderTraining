# configs/sft_standard.yaml
# Baseline 1: Standard Supervised Fine-Tuning (Next-Action Prediction)
model:
  model_path:      ./weights/llada2-mini-merged
  tokenizer_path:  ./weights/LLaDA2.0-mini

data:
  train_path:  ./data/cache/sft_standard_train.jsonl
  test_path:   ./data/cache/sft_standard_test.jsonl

train:
  output_dir:                    ./checkpoints/sft_standard
  num_epochs:                    3
  learning_rate:                 2.5e-5
  lr_scheduler:                  cosine
  min_lr:                        2.5e-6
  warmup_steps:                  50
  weight_decay:                  0.1
  gradient_clip:                 1.0
  per_device_batch_size:         2
  gradient_accumulation_steps:   8      # effective batch = 2 × 4 GPUs × 8 = 64
  max_seq_length:                2048
  mixed_precision:               bf16
  save_steps:                    500
  gradient_checkpointing:        true   # required for A100-40 nodes
  fsdp_type:                     fsdp2  # enable ZeRO-3 sharding

masking:
  mode: standard   # parsed by train_standard_sft.py
