# configs/prefix_sft_stage1.yaml
# Baseline 2 Stage 1: Implicit World Modeling (O_{t+1} prediction from local context)
model:
  model_path:      ./weights/llada2-mini-merged
  tokenizer_path:  ./weights/LLaDA2.0-mini

data:
  train_path:  ./data/cache/prefix_sft_s1_train.jsonl
  test_path:   ./data/cache/prefix_sft_s1_test.jsonl

train:
  output_dir:                    ./checkpoints/prefix_sft_s1
  num_epochs:                    3
  learning_rate:                 2.5e-5
  lr_scheduler:                  cosine
  min_lr:                        2.5e-6
  warmup_steps:                  50
  weight_decay:                  0.1
  gradient_clip:                 1.0
  per_device_batch_size:         4      # shorter sequences
  gradient_accumulation_steps:   4      # effective batch = 4 × 4 × 4 = 64
  max_seq_length:                512
  mixed_precision:               bf16
  save_steps:                    500
  gradient_checkpointing:        true

masking:
  mode: standard
