# configs/aomt_mixed.yaml
# Proposed 2: Any-Order Masked Training (Mixed Observations and Actions)
model:
  model_path:      ./models/llada2-mini-merged
  tokenizer_path:  ./models/llada2-mini-sep

data:
  train_path:  ./data/cache/aomt_train.jsonl
  test_path:   ./data/cache/aomt_test.jsonl

train:
  output_dir:                    ./checkpoints/aomt_mixed
  num_epochs:                    10
  learning_rate:                 5e-5
  lr_scheduler:                  cosine
  min_lr:                        5e-6
  warmup_steps:                  100
  weight_decay:                  0.1
  gradient_clip:                 1.0
  per_device_batch_size:         2
  gradient_accumulation_steps:   8
  max_seq_length:                2048
  mixed_precision:               bf16
  save_steps:                    500
  gradient_checkpointing:        true
  fsdp_type:                     fsdp2

aomt:
  mode: mixed
  mask_prob: 0.25
