# configs/aomt_mixed_ext.yaml
# Extended training: continue AOMT Mixed from epoch_4 for 10 more epochs
model:
  model_path:      ./checkpoints/aomt_mixed/epoch_4          # resume from last checkpoint
  config_path:     ./weights/llada2-mini-merged              # architecture config source
  tokenizer_path:  ./weights/LLaDA2.0-mini

data:
  train_path:  ./data/cache/aomt_train.jsonl
  test_path:   ./data/cache/aomt_test.jsonl

train:
  output_dir:                    ./checkpoints/aomt_mixed_ext
  num_epochs:                    10
  learning_rate:                 1.0e-5      # lower LR for continued training
  lr_scheduler:                  cosine
  min_lr:                        1.0e-6
  warmup_steps:                  20          # shorter warmup since model is warm
  weight_decay:                  0.1
  gradient_clip:                 1.0
  per_device_batch_size:         2
  gradient_accumulation_steps:   8
  max_seq_length:                2048
  mixed_precision:               bf16
  save_steps:                    500
  gradient_checkpointing:        true
  fsdp_type:                     fsdp2

aomt:
  mode:       mixed
  mask_prob:  0.25
