# configs/aomt_action_only.yaml
# Baseline 3: AOMT with masking restricted to ACTION units only.
name: aomt_action_only
model: inclusionAI/LLaDA2.0-mini
data_cache_path: "aomt/data/processed_dataset"

# --- Training Objective ---
mask_mode: "action_only"
mask_prob: 0.25 # Probability of masking any given action unit
use_causal_mask: false # CRITICAL: Use bidirectional attention

# --- dFactory Training Defaults ---
learning_rate: 2.5e-5
warmup_steps: 50
lr_schedule: "cosine"
min_lr: 2.5e-6
weight_decay: 0.1
gradient_clip: 1.0
global_batch_size: 64
per_device_batch_size: 2
gradient_accumulation_steps: 8
max_seq_length: 2048
mixed_precision: "bf16"
# Use more epochs as each epoch shows a different view of the data
num_epochs: 5

# --- Evaluation ---
eval_nll_obs: true # This model has bidirectional attention
eval_task: true
eval_splits: ["seen", "unseen"]
noise_fractions: [0.0, 0.1, 0.2, 0.3]
